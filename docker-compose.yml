version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: codeguru_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: codeguru
      POSTGRES_PASSWORD: codeguru_secret
      POSTGRES_DB: codeguru_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U codeguru -d codeguru_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: codeguru_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: